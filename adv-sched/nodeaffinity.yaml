apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: akash-ns
  labels:
    app: nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      # nodeSelector:
      #   env: testing   # THIS controls where pods run
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoreDuringExection:
            nodeSelectorTerms:
            - matchExpression:
              - key: env
                operator: In
                value:
                - testing
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preferences:
              matchExpression: 
              - key: envs
                operator: In
                value:
                - test

      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80