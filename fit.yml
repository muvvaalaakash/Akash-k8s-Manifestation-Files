apiVersion: apps/v1
kind: Deployment
metadata:
  name: fit-deployment
  namespace: akash-ns
  labels:
    app: fit
spec:
  replicas: 8
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  selector: 
    matchLabels:
      app: fit
  template:
    metadata:
      labels:
        app: fit
    spec:
      containers:
       - name: fit-container
         image: muralisocial123/fitness-app:v1.0.1
         ports: 
          - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata: 
  name: fit-deployment-svc
  namespace: akash-ns
spec:
  selector: 
    app: fit
  ports:
    - port: 3001 # it is a service port Number we are using to expose application to the internet
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
  