apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7-jammy


          ports:
            - containerPort: 27017

          resources:
            limits:
              memory: "256Mi"   # reduced for faster OOM
              cpu: "200m"
            requests:
              memory: "128Mi"
              cpu: "100m"

          volumeMounts:
            - name: host-volume
              mountPath: /data/db

      volumes:
        - name: host-volume
          hostPath:
            path: /data/ust
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP